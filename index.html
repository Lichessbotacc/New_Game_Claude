
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myrmex — Ameisenkolonie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --soil-void:   #160e09;
    --soil-panel:  #2a1c12;
    --soil-panel-2:#342417;
    --tunnel:      #6b4a30;
    --tunnel-lit:  #8a6440;
    --hairline:    #4a3422;
    --leaf:        #8bab57;
    --leaf-dim:    #5c7438;
    --fungus:      #e3a35c;
    --fungus-dim:  #a9712f;
    --cream:       #f3e8d3;
    --cream-dim:   #c9b896;
    --alert:       #c8593c;
    --gold:        #d9b35b;
    --shadow-deep: rgba(0,0,0,0.45);
    --r-card: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #241509 0%, var(--soil-void) 55%);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'Space Mono', monospace;}
  button{font-family:inherit;}

  /* ---------- layout ---------- */
  .app{
    max-width:1180px;
    margin:0 auto;
    padding:18px 18px 40px;
  }
  header.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    padding-bottom:14px;
    border-bottom:1px solid var(--hairline);
    margin-bottom:18px;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand h1{
    font-size:1.7rem;
    margin:0;
    color:var(--cream);
  }
  .brand .sub{
    font-style:italic;
    font-size:0.82rem;
    color:var(--cream-dim);
    font-family:'Fraunces', serif;
  }
  .resources{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }
  .res-chip{
    display:flex;
    align-items:center;
    gap:7px;
    background:var(--soil-panel);
    border:1px solid var(--hairline);
    border-radius:999px;
    padding:6px 14px 6px 10px;
  }
  .res-chip .ic{font-size:1.05rem;}
  .res-chip .val{font-family:'Space Mono',monospace; font-size:0.92rem;}
  .res-chip .lbl{font-size:0.68rem; color:var(--cream-dim); text-transform:uppercase; letter-spacing:.06em;}
  .res-chip.warn .val{color:var(--alert);}

  .layout{
    display:grid;
    grid-template-columns:248px 1fr;
    gap:18px;
    align-items:start;
  }
  @media (max-width: 820px){
    .layout{grid-template-columns:1fr;}
  }

  /* ---------- sidebar ---------- */
  .panel{
    background:var(--soil-panel);
    border:1px solid var(--hairline);
    border-radius:var(--r-card);
    padding:14px;
  }
  .panel + .panel{margin-top:14px;}
  .panel h2{
    font-size:0.95rem;
    margin:0 0 10px;
    color:var(--gold);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .build-btn{
    width:100%;
    display:flex;
    align-items:flex-start;
    gap:10px;
    text-align:left;
    background:var(--soil-panel-2);
    border:1px solid var(--hairline);
    border-radius:8px;
    padding:9px 10px;
    margin-bottom:8px;
    cursor:pointer;
    color:var(--cream);
    transition:border-color .15s, transform .1s, background .15s;
  }
  .build-btn:last-child{margin-bottom:0;}
  .build-btn:hover{border-color:var(--tunnel-lit); background:#3a281a;}
  .build-btn:active{transform:scale(0.98);}
  .build-btn.selected{
    border-color:var(--gold);
    background:#42301c;
    box-shadow:0 0 0 1px var(--gold) inset;
  }
  .build-btn.disabled{opacity:0.45; cursor:not-allowed;}
  .build-btn .ic{font-size:1.3rem; line-height:1.2; flex-shrink:0;}
  .build-btn .meta{flex:1; min-width:0;}
  .build-btn .name{font-weight:600; font-size:0.88rem;}
  .build-btn .desc{font-size:0.72rem; color:var(--cream-dim); margin-top:2px; line-height:1.3;}
  .build-btn .cost{font-size:0.7rem; font-family:'Space Mono',monospace; margin-top:4px; color:var(--fungus);}

  .stat-row{
    display:flex;
    justify-content:space-between;
    font-size:0.82rem;
    padding:4px 0;
    border-bottom:1px dashed var(--hairline);
  }
  .stat-row:last-child{border-bottom:none;}
  .stat-row .v{font-family:'Space Mono',monospace; color:var(--cream);}

  .selected-info{
    font-size:0.78rem;
    color:var(--cream-dim);
    line-height:1.5;
    min-height:34px;
  }
  .cancel-btn{
    margin-top:10px;
    width:100%;
    background:transparent;
    border:1px solid var(--hairline);
    color:var(--cream-dim);
    border-radius:8px;
    padding:6px;
    font-size:0.75rem;
    cursor:pointer;
  }
  .cancel-btn:hover{border-color:var(--alert); color:var(--alert);}

  /* ---------- board ---------- */
  .board-wrap{
    background:
      radial-gradient(ellipse at 50% 0%, #2a1c10 0%, #160d07 75%);
    border:1px solid var(--hairline);
    border-radius:var(--r-card);
    padding:20px;
    overflow:auto;
    position:relative;
  }
  .tunnel-grid{
    display:grid;
    position:relative;
    margin:0 auto;
    width:max-content;
  }
  .cell{
    width:54px; height:54px;
    border-radius:38% 62% 55% 45% / 48% 42% 58% 52%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    cursor:pointer;
    position:relative;
    transition:transform .12s, box-shadow .15s, filter .15s;
    user-select:none;
  }
  .cell.undug{
    background:repeating-linear-gradient(135deg, #1c120a 0 6px, #19100a 6px 12px);
    border:1px solid #100a05;
    cursor:default;
  }
  .cell.undug.diggable{
    cursor:pointer;
    box-shadow:0 0 0 1px var(--leaf-dim) inset;
  }
  .cell.undug.diggable:hover{filter:brightness(1.3);}
  .cell.dug{
    background:linear-gradient(145deg, var(--tunnel-lit), var(--tunnel));
    border:1px solid #3a2716;
    box-shadow: inset 0 2px 4px rgba(0,0,0,.35), 0 2px 3px var(--shadow-deep);
  }
  .cell.dug.empty.buildable{box-shadow:0 0 0 2px var(--gold) inset, inset 0 2px 4px rgba(0,0,0,.35);}
  .cell.dug.empty.buildable:hover{transform:scale(1.06);}
  .cell.room-forage{background:linear-gradient(145deg, #9bbf66, var(--leaf-dim));}
  .cell.room-fungus{background:linear-gradient(145deg, #f0b56e, var(--fungus-dim));}
  .cell.room-nursery{background:linear-gradient(145deg, #fbf1de, #cdb986); color:#3a2c14;}
  .cell.room-barracks{background:linear-gradient(145deg, #d8714f, #8e3a26);}
  .cell.room-queen{
    background:radial-gradient(circle at 35% 30%, #fff3cf, var(--gold) 70%);
    color:#3a2a08;
    box-shadow:0 0 0 2px var(--gold), 0 0 14px 2px rgba(217,179,91,.5);
  }
  .cell .badge{
    position:absolute;
    bottom:-6px; right:-4px;
    background:var(--soil-void);
    border:1px solid var(--hairline);
    border-radius:6px;
    font-size:0.55rem;
    padding:1px 3px;
    font-family:'Space Mono',monospace;
    color:var(--cream-dim);
  }
  .conn{
    border-radius:5px;
  }
  .conn.h{background:transparent;}
  .conn.v{background:transparent;}
  .conn.active{
    background:linear-gradient(var(--tunnel-lit), var(--tunnel));
    box-shadow: inset 0 0 3px rgba(0,0,0,.4);
  }

  .ant-dot{
    position:absolute;
    width:7px; height:7px;
    border-radius:50%;
    background:#1c1108;
    box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 0 3px rgba(0,0,0,.5);
    pointer-events:none;
    z-index:5;
    transition: left 1.1s cubic-bezier(.4,0,.2,1), top 1.1s cubic-bezier(.4,0,.2,1), opacity .3s;
  }
  .ant-dot.leaf::after{content:'';position:absolute; top:-3px; left:1px; width:4px; height:4px; background:var(--leaf); border-radius:1px; transform:rotate(20deg);}
  .ant-dot.fungus::after{content:'';position:absolute; top:-3px; left:1px; width:4px; height:4px; background:var(--fungus); border-radius:50%;}

  /* ---------- log ---------- */
  .log-panel{
    margin-top:16px;
  }
  .log-list{
    list-style:none;
    margin:0; padding:0;
    max-height:150px;
    overflow-y:auto;
    font-size:0.8rem;
    display:flex;
    flex-direction:column-reverse;
    gap:5px;
  }
  .log-list li{
    color:var(--cream-dim);
    border-left:2px solid var(--hairline);
    padding-left:8px;
  }
  .log-list li.raid-fail{color:var(--alert); border-left-color:var(--alert);}
  .log-list li.raid-win{color:var(--leaf); border-left-color:var(--leaf);}
  .log-list li.fresh{color:var(--cream);}
  .log-time{font-family:'Space Mono',monospace; font-size:0.68rem; color:var(--cream-dim); margin-right:6px;}

  footer.appfoot{
    margin-top:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:0.72rem;
    color:var(--cream-dim);
    flex-wrap:wrap;
    gap:8px;
  }
  .reset-btn{
    background:transparent;
    border:1px solid var(--hairline);
    color:var(--cream-dim);
    border-radius:6px;
    padding:5px 10px;
    font-size:0.72rem;
    cursor:pointer;
  }
  .reset-btn:hover{border-color:var(--alert); color:var(--alert);}

  .toast{
    position:fixed;
    bottom:20px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--soil-panel);
    border:1px solid var(--gold);
    color:var(--cream);
    padding:10px 18px;
    border-radius:8px;
    font-size:0.85rem;
    opacity:0;
    transition:opacity .3s, transform .3s;
    pointer-events:none;
    z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--hairline); border-radius:4px;}

  @media (prefers-reduced-motion: reduce){
    .ant-dot{transition:none;}
    .build-btn, .cell{transition:none;}
  }
  :focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <h1>🐜 Myrmex</h1>
      <span class="sub">eine Kolonie unter der Erde</span>
    </div>
    <div class="resources" id="resourceBar"></div>
  </header>

  <div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="panel">
        <h2>⛏ Graben</h2>
        <button class="build-btn" id="digBtn" data-mode="dig">
          <span class="ic">⛏</span>
          <span class="meta">
            <div class="name">Tunnel graben</div>
            <div class="desc">Erweitert den Bau an einen angrenzenden Gang.</div>
            <div class="cost" id="digCost">— Blätter</div>
          </span>
        </button>
      </div>

      <div class="panel">
        <h2>🏗 Bauen</h2>
        <div id="buildPalette"></div>
      </div>

      <div class="panel">
        <h2>🐾 Volk</h2>
        <div class="stat-row"><span>Ameisen</span><span class="v" id="statAnts">–</span></div>
        <div class="stat-row"><span>Arbeitskraft benötigt</span><span class="v" id="statWorkersNeeded">–</span></div>
        <div class="stat-row"><span>Soldatinnen</span><span class="v" id="statSoldiers">–</span></div>
        <div class="stat-row"><span>Effizienz</span><span class="v" id="statEfficiency">–</span></div>
      </div>

      <div class="panel">
        <h2>ℹ Auswahl</h2>
        <div class="selected-info" id="selectedInfo">Wähle links eine Aktion, dann klicke auf den Bau.</div>
        <button class="cancel-btn" id="cancelBtn" style="display:none;">Auswahl aufheben</button>
      </div>
    </div>

    <!-- BOARD -->
    <div class="board-area">
      <div class="board-wrap">
        <div class="tunnel-grid" id="grid"></div>
      </div>

      <div class="panel log-panel">
        <h2>📜 Kolonie-Chronik</h2>
        <ul class="log-list" id="logList"></ul>
      </div>
    </div>
  </div>

  <footer class="appfoot">
    <span>Alter der Kolonie: <span class="mono" id="colonyAge">0:00</span> · nächster Überfall in <span class="mono" id="raidCountdown">–</span></span>
    <button class="reset-btn" id="resetBtn">Kolonie zurücksetzen</button>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ===================== CONFIG ===================== */
  const GR = 5, GC = 6;                 // logical room grid
  const QUEEN_R = 2, QUEEN_C = 2;
  const CELL = 54, CONN = 16;

  const ROOM_TYPES = {
    forage: {
      name:'Sammelgang', icon:'🍃', cls:'room-forage',
      cost:{leaves:10},
      desc:'Sammelt Blattstücke aus der Umgebung.',
    },
    fungus: {
      name:'Pilzgarten', icon:'🍄', cls:'room-fungus',
      cost:{leaves:25},
      desc:'Wandelt Blätter in nährendes Pilzfutter um.',
    },
    nursery: {
      name:'Kinderstube', icon:'🥚', cls:'room-nursery',
      cost:{leaves:30, fungus:15},
      desc:'Erhöht das Bevölkerungslimit und zieht Larven auf.',
    },
    barracks: {
      name:'Kaserne', icon:'🛡', cls:'room-barracks',
      cost:{leaves:35, fungus:20},
      desc:'Bildet bis zu 3 Soldatinnen zur Verteidigung aus.',
    }
  };

  const RATES = {
    leafPerForage: 0.9,
    fungusLeafCost: 1.4,
    fungusPerFungusRoom: 0.7,
    nurseryFungusPerAnt: 9,
    nurseryProgressPerSec: 0.16,
    soldierDefense: 4,
    baseDefense: 2,
    barracksCapacity: 3,
    digBaseCost: 8,
    digCostStep: 4,
  };

  const SAVE_KEY = 'myrmex_save_v1';

  /* ===================== STATE ===================== */
  let cells = [];        // GR*GC logical cells {dug, room}
  let resources = {leaves:18, fungus:4};
  let ants = 4;
  let antsCap = 6;
  let nurseryProgress = 0;
  let mode = null;        // null | 'dig' | room key
  let ageSec = 0;
  let nextRaidIn = randRange(40,65);
  let logEntries = [];
  let antDotPool = [];

  function randRange(a,b){return Math.floor(a + Math.random()*(b-a));}

  /* ===================== INIT ===================== */
  function freshState(){
    cells = [];
    for(let r=0;r<GR;r++){
      for(let c=0;c<GC;c++){
        cells.push({r,c, dug:false, room:null});
      }
    }
    cellAt(QUEEN_R,QUEEN_C).dug = true;
    cellAt(QUEEN_R,QUEEN_C).room = 'queen';
    resources = {leaves:18, fungus:4};
    ants = 4; antsCap = 6; nurseryProgress = 0;
    ageSec = 0; nextRaidIn = randRange(40,65);
    logEntries = [];
    addLog('Die Königin hat ihre erste Kammer gegraben. Die Kolonie beginnt.', 'fresh');
  }

  function cellAt(r,c){ return cells[r*GC+c]; }
  function idx(r,c){ return r*GC+c; }
  function inBounds(r,c){ return r>=0 && r<GR && c>=0 && c<GC; }

  function neighbors(r,c){
    return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc])=>inBounds(nr,nc));
  }

  function isDiggable(r,c){
    const cell = cellAt(r,c);
    if(cell.dug) return false;
    return neighbors(r,c).some(([nr,nc])=>cellAt(nr,nc).dug);
  }

  function digCost(){
    const dugCount = cells.filter(c=>c.dug).length;
    return RATES.digBaseCost + dugCount * RATES.digCostStep;
  }

  /* ===================== ECONOMY TICK ===================== */
  function tick(){
    ageSec++;
    const forageRooms = cells.filter(c=>c.room==='forage');
    const fungusRooms  = cells.filter(c=>c.room==='fungus');
    const nurseryRooms = cells.filter(c=>c.room==='nursery');
    const barracksRooms= cells.filter(c=>c.room==='barracks');

    const workersNeeded = forageRooms.length + fungusRooms.length + nurseryRooms.length + barracksRooms.length;
    const efficiency = workersNeeded>0 ? Math.min(1, ants/workersNeeded) : 1;

    // foraging
    if(forageRooms.length>0){
      const gain = forageRooms.length * RATES.leafPerForage * efficiency;
      resources.leaves += gain;
      if(Math.random() < 0.5*efficiency){
        const src = forageRooms[randRange(0,forageRooms.length)];
        spawnAntDot(src, cellAt(QUEEN_R,QUEEN_C), 'leaf');
      }
    }

    // fungus conversion
    if(fungusRooms.length>0){
      const wanted = fungusRooms.length * RATES.fungusLeafCost * efficiency;
      const used = Math.min(wanted, resources.leaves);
      const ratio = wanted>0 ? used/wanted : 0;
      resources.leaves -= used;
      resources.fungus += fungusRooms.length * RATES.fungusPerFungusRoom * efficiency * ratio;
      if(Math.random() < 0.4*efficiency*ratio){
        const src = fungusRooms[randRange(0,fungusRooms.length)];
        spawnAntDot(src, cellAt(QUEEN_R,QUEEN_C), 'fungus');
      }
    }

    // nursery growth
    antsCap = 6 + nurseryRooms.length * 4;
    if(nurseryRooms.length>0 && ants < antsCap){
      nurseryProgress += nurseryRooms.length * RATES.nurseryProgressPerSec * efficiency;
      if(nurseryProgress >= 1){
        const cost = RATES.nurseryFungusPerAnt;
        if(resources.fungus >= cost){
          resources.fungus -= cost;
          ants += 1;
          nurseryProgress -= 1;
          addLog('Eine neue Arbeiterin hat ihre Larvenkammer verlassen.', 'fresh');
        } else {
          nurseryProgress = 0.99; // wait for fungus
        }
      }
    }

    // soldiers derived (not stored ants, just capacity used for defense)
    const idleAnts = Math.max(0, ants - workersNeeded);
    const soldierCap = barracksRooms.length * RATES.barracksCapacity;
    const soldiers = Math.min(idleAnts, soldierCap);

    state.lastSoldiers = soldiers;
    state.lastWorkersNeeded = workersNeeded;
    state.lastEfficiency = efficiency;

    // raid countdown
    nextRaidIn--;
    if(nextRaidIn <= 0){
      runRaid(soldiers);
      nextRaidIn = randRange(50,85);
    }

    resources.leaves = Math.max(0, resources.leaves);
    resources.fungus = Math.max(0, resources.fungus);

    renderTopline();
    save();
  }

  const state = {lastSoldiers:0, lastWorkersNeeded:0, lastEfficiency:1};

  function runRaid(soldiers){
    const minutes = ageSec/60;
    const raidStrength = 6 + minutes*1.6 + Math.random()*4;
    const defense = RATES.baseDefense + soldiers*RATES.soldierDefense;
    if(defense >= raidStrength){
      const bonus = Math.round(4 + Math.random()*6);
      resources.leaves += bonus;
      addLog(`Ein Ameisenbär griff an — eure ${soldiers} Soldatinnen haben ihn vertrieben. +${bonus} Blätter erbeutet.`, 'raid-win');
      flashToast('Überfall abgewehrt! 🛡');
    } else {
      const lossLeaves = Math.round(resources.leaves*0.3);
      const lossFungus = Math.round(resources.fungus*0.3);
      resources.leaves -= lossLeaves;
      resources.fungus -= lossFungus;
      let antLoss = 0;
      if(soldiers===0 && raidStrength > defense+5 && ants>2){
        antLoss = 1; ants -= 1;
      }
      addLog(`Ein Ameisenbär hat die Kolonie überrannt! Verloren: ${lossLeaves} Blätter, ${lossFungus} Pilzfutter${antLoss?', 1 Ameise':''}.`, 'raid-fail');
      flashToast('Überfall! Die Kolonie wurde geplündert.');
    }
  }

  /* ===================== ANT DOT ANIMATION ===================== */
  function cellPixelCenter(cell){
    const colLine = cell.c*2;   // 0-based column line of the cell within grid
    const rowLine = cell.r*2;
    const x = colLine*(CELL) + Math.floor(colLine/2)*0 + (colLine/2)*CONN + CELL/2;
    const y = rowLine*(CELL) + (rowLine/2)*CONN + CELL/2;
    return {x,y};
  }
  // Simplify with accurate track accumulation:
  function trackPos(n){ // pixel offset of grid line "n" (0-based room/connector unit index)
    // pattern: room, conn, room, conn, ... ; n counts rooms+connectors passed
    let pos = 0;
    for(let i=0;i<n;i++){
      pos += (i%2===0) ? CELL : CONN;
    }
    return pos;
  }
  function cellCenterPx(cell){
    const colUnit = cell.c*2;
    const rowUnit = cell.r*2;
    const x = trackPos(colUnit) + CELL/2;
    const y = trackPos(rowUnit) + CELL/2;
    return {x,y};
  }

  function spawnAntDot(fromCell, toCell, kind){
    const grid = document.getElementById('grid');
    const from = cellCenterPx(fromCell);
    const to = cellCenterPx(toCell);
    const dot = document.createElement('div');
    dot.className = 'ant-dot ' + kind;
    dot.style.left = (from.x-3.5)+'px';
    dot.style.top = (from.y-3.5)+'px';
    grid.appendChild(dot);
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        dot.style.left = (to.x-3.5)+'px';
        dot.style.top = (to.y-3.5)+'px';
      });
    });
    setTimeout(()=>{
      dot.style.opacity = '0';
      setTimeout(()=>dot.remove(), 350);
    }, 1150);
  }

  /* ===================== RENDER ===================== */
  function buildGridDom(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const dispCols = GC*2-1, dispRows = GR*2-1;
    const colTemplate = [];
    for(let i=0;i<dispCols;i++) colTemplate.push(i%2===0? CELL+'px' : CONN+'px');
    const rowTemplate = [];
    for(let i=0;i<dispRows;i++) rowTemplate.push(i%2===0? CELL+'px' : CONN+'px');
    grid.style.gridTemplateColumns = colTemplate.join(' ');
    grid.style.gridTemplateRows = rowTemplate.join(' ');

    // room cells
    for(let r=0;r<GR;r++){
      for(let c=0;c<GC;c++){
        const el = document.createElement('div');
        el.dataset.r=r; el.dataset.c=c;
        el.style.gridColumn = String(c*2+1);
        el.style.gridRow = String(r*2+1);
        el.addEventListener('click', ()=>onCellClick(r,c));
        el.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' ') onCellClick(r,c); });
        el.tabIndex = 0;
        grid.appendChild(el);
      }
    }
    // horizontal connectors (between c and c+1, same row)
    for(let r=0;r<GR;r++){
      for(let c=0;c<GC-1;c++){
        const el = document.createElement('div');
        el.className='conn h';
        el.dataset.type='h'; el.dataset.r=r; el.dataset.c=c;
        el.style.gridColumn = String(c*2+2);
        el.style.gridRow = String(r*2+1);
        grid.appendChild(el);
      }
    }
    // vertical connectors (between r and r+1, same col)
    for(let r=0;r<GR-1;r++){
      for(let c=0;c<GC;c++){
        const el = document.createElement('div');
        el.className='conn v';
        el.dataset.type='v'; el.dataset.r=r; el.dataset.c=c;
        el.style.gridColumn = String(c*2+1);
        el.style.gridRow = String(r*2+2);
        grid.appendChild(el);
      }
    }
    renderCells();
  }

  function renderCells(){
    const grid = document.getElementById('grid');
    // rooms
    grid.querySelectorAll('[data-r][data-c]:not([data-type])').forEach(el=>{
      const r = +el.dataset.r, c = +el.dataset.c;
      const cell = cellAt(r,c);
      el.className = 'cell';
      el.innerHTML = '';
      if(!cell.dug){
        el.classList.add('undug');
        if(isDiggable(r,c) && mode==='dig') el.classList.add('diggable');
      } else if(cell.room){
        const def = ROOM_TYPES[cell.room] || (cell.room==='queen'? {icon:'👑',cls:'room-queen'} : null);
        el.classList.add('dug');
        if(def){ el.classList.add(def.cls); el.innerHTML = `<span>${def.icon}</span>`; }
        if(cell.room==='nursery'){
          const pct = Math.min(99, Math.round(nurseryProgress*100));
          el.innerHTML += `<span class="badge">${pct}%</span>`;
        }
      } else {
        el.classList.add('dug','empty');
        if(mode && ROOM_TYPES[mode]) el.classList.add('buildable');
        el.innerHTML = '<span style="opacity:.35;font-size:1.1rem;">·</span>';
      }
    });
    // connectors
    grid.querySelectorAll('.conn').forEach(el=>{
      const r = +el.dataset.r, c = +el.dataset.c;
      let active;
      if(el.dataset.type==='h') active = cellAt(r,c).dug && cellAt(r,c+1).dug;
      else active = cellAt(r,c).dug && cellAt(r+1,c).dug;
      el.classList.toggle('active', active);
    });
  }

  function fmt(n){ return Math.floor(n).toLocaleString('de-DE'); }

  function renderTopline(){
    document.getElementById('resourceBar').innerHTML = `
      <div class="res-chip"><span class="ic">🍃</span><span class="val">${fmt(resources.leaves)}</span><span class="lbl">Blätter</span></div>
      <div class="res-chip"><span class="ic">🍄</span><span class="val">${fmt(resources.fungus)}</span><span class="lbl">Pilzfutter</span></div>
      <div class="res-chip ${ants>=antsCap?'warn':''}"><span class="ic">🐜</span><span class="val">${ants}/${antsCap}</span><span class="lbl">Ameisen</span></div>
    `;
    document.getElementById('digCost').textContent = `${digCost()} Blätter`;
    document.getElementById('statAnts').textContent = `${ants} / ${antsCap}`;
    document.getElementById('statWorkersNeeded').textContent = state.lastWorkersNeeded;
    document.getElementById('statSoldiers').textContent = state.lastSoldiers;
    document.getElementById('statEfficiency').textContent = Math.round(state.lastEfficiency*100)+'%';
    const mm = Math.floor(ageSec/60), ss = ageSec%60;
    document.getElementById('colonyAge').textContent = `${mm}:${String(ss).padStart(2,'0')}`;
    document.getElementById('raidCountdown').textContent = `${nextRaidIn}s`;
    renderPalette();
  }

  function renderPalette(){
    const wrap = document.getElementById('buildPalette');
    wrap.innerHTML = '';
    Object.entries(ROOM_TYPES).forEach(([key,def])=>{
      const affordable = canAfford(def.cost);
      const btn = document.createElement('button');
      btn.className = 'build-btn' + (mode===key?' selected':'') + (!affordable?' disabled':'');
      btn.innerHTML = `
        <span class="ic">${def.icon}</span>
        <span class="meta">
          <div class="name">${def.name}</div>
          <div class="desc">${def.desc}</div>
          <div class="cost">${costString(def.cost)}</div>
        </span>`;
      btn.addEventListener('click', ()=>{
        mode = (mode===key) ? null : key;
        updateModeUi();
      });
      wrap.appendChild(btn);
    });
  }

  function costString(cost){
    return Object.entries(cost).map(([k,v])=> `${v} ${k==='leaves'?'Blätter':'Pilzfutter'}`).join(' · ');
  }
  function canAfford(cost){
    return Object.entries(cost).every(([k,v])=> resources[k] >= v);
  }

  function updateModeUi(){
    document.getElementById('digBtn').classList.toggle('selected', mode==='dig');
    document.getElementById('cancelBtn').style.display = mode ? 'block' : 'none';
    const info = document.getElementById('selectedInfo');
    if(mode==='dig'){
      info.textContent = `Klicke auf einen markierten Gang, um ihn für ${digCost()} Blätter zu graben.`;
    } else if(mode && ROOM_TYPES[mode]){
      info.textContent = `Klicke auf eine leere, gegrabene Kammer, um „${ROOM_TYPES[mode].name}“ zu bauen.`;
    } else {
      info.textContent = 'Wähle links eine Aktion, dann klicke auf den Bau.';
    }
    renderCells();
    renderPalette();
  }

  /* ===================== INTERACTION ===================== */
  function onCellClick(r,c){
    const cell = cellAt(r,c);
    if(mode==='dig'){
      if(!isDiggable(r,c)){ flashToast('Dieser Gang ist noch nicht erreichbar.'); return; }
      const cost = digCost();
      if(resources.leaves < cost){ flashToast('Nicht genug Blätter zum Graben.'); return; }
      resources.leaves -= cost;
      cell.dug = true;
      addLog('Ein neuer Gang wurde in die Erde gegraben.', 'fresh');
      renderTopline(); renderCells(); save();
      return;
    }
    if(mode && ROOM_TYPES[mode]){
      if(!cell.dug || cell.room){ flashToast('Hier kann nichts gebaut werden.'); return; }
      const def = ROOM_TYPES[mode];
      if(!canAfford(def.cost)){ flashToast('Nicht genug Ressourcen.'); return; }
      Object.entries(def.cost).forEach(([k,v])=> resources[k]-=v);
      cell.room = mode;
      addLog(`${def.name} wurde gebaut.`, 'fresh');
      renderTopline(); renderCells(); save();
      return;
    }
    // info click
    if(cell.room){
      const def = ROOM_TYPES[cell.room];
      if(def) flashToast(`${def.icon} ${def.name} — ${def.desc}`);
      else flashToast('👑 Die Königskammer — Herz der Kolonie.');
    }
  }

  document.getElementById('digBtn').addEventListener('click', ()=>{
    mode = (mode==='dig') ? null : 'dig';
    updateModeUi();
  });
  document.getElementById('cancelBtn').addEventListener('click', ()=>{
    mode = null; updateModeUi();
  });
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    if(confirm('Die gesamte Kolonie wirklich auflösen und neu beginnen?')){
      localStorage.removeItem(SAVE_KEY);
      freshState();
      buildGridDom();
      renderTopline();
    }
  });

  /* ===================== LOG / TOAST ===================== */
  function addLog(text, cls){
    const time = `${Math.floor(ageSec/60)}:${String(ageSec%60).padStart(2,'0')}`;
    logEntries.push({text,cls,time});
    if(logEntries.length>60) logEntries.shift();
    renderLog();
  }
  function renderLog(){
    const list = document.getElementById('logList');
    list.innerHTML = logEntries.slice(-40).map(e=>
      `<li class="${e.cls||''}"><span class="log-time">${e.time}</span>${e.text}</li>`
    ).reverse().join('');
  }
  let toastTimer=null;
  function flashToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
  }

  /* ===================== SAVE / LOAD ===================== */
  function save(){
    try{
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        cells, resources, ants, antsCap, nurseryProgress, ageSec, nextRaidIn, logEntries
      }));
    }catch(e){ /* storage unavailable, ignore */ }
  }
  function load(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw) return false;
      const data = JSON.parse(raw);
      cells = data.cells; resources = data.resources; ants = data.ants;
      antsCap = data.antsCap; nurseryProgress = data.nurseryProgress;
      ageSec = data.ageSec; nextRaidIn = data.nextRaidIn;
      logEntries = data.logEntries || [];
      return true;
    }catch(e){ return false; }
  }

  /* ===================== BOOT ===================== */
  if(!load()){ freshState(); }
  buildGridDom();
  renderTopline();
  renderLog();
  updateModeUi();
  setInterval(tick, 1000);

})();
</script>
</body>
</html>
