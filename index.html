<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myrmex — Ameisenkolonie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --soil-void:   #160e09;
    --soil-panel:  #2a1c12;
    --soil-panel-2:#342417;
    --soil-panel-3:#1f140d;
    --tunnel:      #6b4a30;
    --tunnel-lit:  #8a6440;
    --hairline:    #4a3422;
    --hairline-lit:#5e4530;
    --leaf:        #8bab57;
    --leaf-dim:    #5c7438;
    --fungus:      #e3a35c;
    --fungus-dim:  #a9712f;
    --water:       #6fa8b8;
    --water-dim:   #3f6c7a;
    --cream:       #f3e8d3;
    --cream-dim:   #c9b896;
    --cream-faint: #8a7a60;
    --alert:       #c8593c;
    --alert-dim:   #8a3c28;
    --gold:        #d9b35b;
    --gold-dim:    #a9863f;
    --science:     #8e7bc4;
    --science-dim: #5f4f8c;
    --shadow-deep: rgba(0,0,0,0.45);
    --r-card: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #241509 0%, var(--soil-void) 55%);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'Space Mono', monospace;}
  button{font-family:inherit;}
  p{margin:0 0 8px;}

  /* ---------- layout ---------- */
  .app{
    max-width:1280px;
    margin:0 auto;
    padding:18px 18px 40px;
  }
  header.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    padding-bottom:14px;
    border-bottom:1px solid var(--hairline);
    margin-bottom:18px;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand h1{
    font-size:1.7rem;
    margin:0;
    color:var(--cream);
  }
  .brand .sub{
    font-style:italic;
    font-size:0.82rem;
    color:var(--cream-dim);
    font-family:'Fraunces', serif;
  }
  .species-pill{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--soil-panel);
    border:1px solid var(--hairline);
    border-radius:999px;
    padding:5px 12px;
    font-size:0.72rem;
    color:var(--cream-dim);
    cursor:default;
  }
  .species-pill .sp-ic{font-size:1rem;}
  .resources{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .res-chip{
    display:flex;
    align-items:center;
    gap:7px;
    background:var(--soil-panel);
    border:1px solid var(--hairline);
    border-radius:999px;
    padding:6px 14px 6px 10px;
  }
  .res-chip .ic{font-size:1.05rem;}
  .res-chip .val{font-family:'Space Mono',monospace; font-size:0.92rem;}
  .res-chip .lbl{font-size:0.68rem; color:var(--cream-dim); text-transform:uppercase; letter-spacing:.06em;}
  .res-chip.warn .val{color:var(--alert);}
  .res-chip.cap .val{color:var(--gold);}

  .season-strip{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    background:var(--soil-panel);
    border:1px solid var(--hairline);
    border-radius:var(--r-card);
    padding:10px 16px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .season-info{display:flex; align-items:center; gap:10px; font-size:0.85rem;}
  .season-icon{font-size:1.5rem;}
  .season-bar-track{
    width:160px; height:6px; border-radius:4px; background:var(--soil-panel-3);
    overflow:hidden; border:1px solid var(--hairline);
  }
  .season-bar-fill{height:100%; background:linear-gradient(90deg, var(--leaf-dim), var(--leaf)); transition:width .4s;}
  .season-name{font-weight:600;}
  .season-desc{color:var(--cream-dim); font-size:0.76rem;}

  .layout{
    display:grid;
    grid-template-columns:268px 1fr;
    gap:18px;
    align-items:start;
  }
  @media (max-width: 880px){
    .layout{grid-template-columns:1fr;}
  }

  /* ---------- tabs ---------- */
  .tabbar{
    display:flex;
    gap:4px;
    margin-bottom:14px;
    background:var(--soil-panel-3);
    border-radius:999px;
    padding:4px;
    border:1px solid var(--hairline);
  }
  .tab-btn{
    flex:1;
    background:transparent;
    border:none;
    color:var(--cream-dim);
    font-size:0.74rem;
    padding:7px 4px;
    border-radius:999px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    transition:background .15s, color .15s;
  }
  .tab-btn .ic{font-size:0.95rem;}
  .tab-btn:hover{color:var(--cream);}
  .tab-btn.active{background:var(--soil-panel); color:var(--gold); box-shadow:0 0 0 1px var(--hairline-lit) inset;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* ---------- sidebar / panel ---------- */
  .panel{
    background:var(--soil-panel);
    border:1px solid var(--hairline);
    border-radius:var(--r-card);
    padding:14px;
  }
  .panel + .panel{margin-top:14px;}
  .panel h2{
    font-size:0.95rem;
    margin:0 0 10px;
    color:var(--gold);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .panel h2 .count-badge{
    margin-left:auto;
    font-family:'Space Mono',monospace;
    font-size:0.68rem;
    color:var(--cream-dim);
    background:var(--soil-panel-3);
    border-radius:6px;
    padding:1px 6px;
  }
  .panel-note{font-size:0.72rem; color:var(--cream-faint); line-height:1.5; margin-top:6px;}

  .build-btn{
    width:100%;
    display:flex;
    align-items:flex-start;
    gap:10px;
    text-align:left;
    background:var(--soil-panel-2);
    border:1px solid var(--hairline);
    border-radius:8px;
    padding:9px 10px;
    margin-bottom:8px;
    cursor:pointer;
    color:var(--cream);
    transition:border-color .15s, transform .1s, background .15s;
  }
  .build-btn:last-child{margin-bottom:0;}
  .build-btn:hover{border-color:var(--tunnel-lit); background:#3a281a;}
  .build-btn:active{transform:scale(0.98);}
  .build-btn.selected{
    border-color:var(--gold);
    background:#42301c;
    box-shadow:0 0 0 1px var(--gold) inset;
  }
  .build-btn.disabled{opacity:0.45; cursor:not-allowed;}
  .build-btn.locked{opacity:0.4; cursor:not-allowed; position:relative;}
  .build-btn .ic{font-size:1.3rem; line-height:1.2; flex-shrink:0;}
  .build-btn .meta{flex:1; min-width:0;}
  .build-btn .name{font-weight:600; font-size:0.88rem; display:flex; align-items:center; gap:6px;}
  .build-btn .desc{font-size:0.72rem; color:var(--cream-dim); margin-top:2px; line-height:1.3;}
  .build-btn .cost{font-size:0.7rem; font-family:'Space Mono',monospace; margin-top:4px; color:var(--fungus);}
  .lock-tag{font-size:0.6rem; background:var(--soil-panel-3); border:1px solid var(--hairline); border-radius:5px; padding:1px 5px; color:var(--cream-faint);}

  .stat-row{
    display:flex;
    justify-content:space-between;
    font-size:0.82rem;
    padding:4px 0;
    border-bottom:1px dashed var(--hairline);
  }
  .stat-row:last-child{border-bottom:none;}
  .stat-row .v{font-family:'Space Mono',monospace; color:var(--cream);}

  .selected-info{
    font-size:0.78rem;
    color:var(--cream-dim);
    line-height:1.5;
    min-height:34px;
  }
  .cancel-btn{
    margin-top:10px;
    width:100%;
    background:transparent;
    border:1px solid var(--hairline);
    color:var(--cream-dim);
    border-radius:8px;
    padding:6px;
    font-size:0.75rem;
    cursor:pointer;
  }
  .cancel-btn:hover{border-color:var(--alert); color:var(--alert);}

  /* caste assignment sliders */
  .caste-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 0;
    border-bottom:1px dashed var(--hairline);
  }
  .caste-row:last-child{border-bottom:none;}
  .caste-row .ic{font-size:1.1rem; width:22px; text-align:center;}
  .caste-row .lbl{flex:1; font-size:0.78rem;}
  .caste-row .ctrl{display:flex; align-items:center; gap:6px;}
  .caste-row button{
    width:22px; height:22px;
    border-radius:5px;
    border:1px solid var(--hairline);
    background:var(--soil-panel-2);
    color:var(--cream);
    cursor:pointer;
    font-size:0.85rem;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .caste-row button:hover{border-color:var(--gold);}
  .caste-row button:disabled{opacity:0.3; cursor:not-allowed;}
  .caste-row .num{
    font-family:'Space Mono',monospace; font-size:0.82rem; width:22px; text-align:center;
  }
  .caste-total-row{
    display:flex; justify-content:space-between; font-size:0.74rem; color:var(--cream-faint);
    margin-top:8px; padding-top:8px; border-top:1px solid var(--hairline);
  }
  .caste-total-row.over{color:var(--alert);}

  /* ---------- board ---------- */
  .board-wrap{
    background:
      radial-gradient(ellipse at 50% 0%, #2a1c10 0%, #160d07 75%);
    border:1px solid var(--hairline);
    border-radius:var(--r-card);
    padding:20px;
    overflow:auto;
    position:relative;
  }
  .depth-tabs{
    display:flex;
    gap:6px;
    margin-bottom:14px;
  }
  .depth-tab{
    background:var(--soil-panel-2);
    border:1px solid var(--hairline);
    color:var(--cream-dim);
    border-radius:8px;
    padding:6px 12px;
    font-size:0.76rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .depth-tab.active{border-color:var(--gold); color:var(--gold); background:#3a2a16;}
  .depth-tab.locked{opacity:0.4; cursor:not-allowed;}
  .depth-tab .badge-new{
    background:var(--alert); color:var(--cream); font-size:0.55rem; padding:1px 4px; border-radius:4px;
  }

  .tunnel-grid{
    display:grid;
    position:relative;
    margin:0 auto;
    width:max-content;
  }
  .cell{
    width:54px; height:54px;
    border-radius:38% 62% 55% 45% / 48% 42% 58% 52%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    cursor:pointer;
    position:relative;
    transition:transform .12s, box-shadow .15s, filter .15s;
    user-select:none;
  }
  .cell.undug{
    background:repeating-linear-gradient(135deg, #1c120a 0 6px, #19100a 6px 12px);
    border:1px solid #100a05;
    cursor:default;
  }
  .cell.undug.diggable{
    cursor:pointer;
    box-shadow:0 0 0 1px var(--leaf-dim) inset;
  }
  .cell.undug.diggable:hover{filter:brightness(1.3);}
  .cell.dug{
    background:linear-gradient(145deg, var(--tunnel-lit), var(--tunnel));
    border:1px solid #3a2716;
    box-shadow: inset 0 2px 4px rgba(0,0,0,.35), 0 2px 3px var(--shadow-deep);
  }
  .cell.dug.empty.buildable{box-shadow:0 0 0 2px var(--gold) inset, inset 0 2px 4px rgba(0,0,0,.35);}
  .cell.dug.empty.buildable:hover{transform:scale(1.06);}
  .cell.room-forage{background:linear-gradient(145deg, #9bbf66, var(--leaf-dim));}
  .cell.room-fungus{background:linear-gradient(145deg, #f0b56e, var(--fungus-dim));}
  .cell.room-nursery{background:linear-gradient(145deg, #fbf1de, #cdb986); color:#3a2c14;}
  .cell.room-barracks{background:linear-gradient(145deg, #d8714f, #8e3a26);}
  .cell.room-storage{background:linear-gradient(145deg, #c9a86a, #8a6a35);}
  .cell.room-water{background:linear-gradient(145deg, #8fcbdb, var(--water-dim));}
  .cell.room-compost{background:linear-gradient(145deg, #7a6a4a, #4a3e28);}
  .cell.room-lab{background:linear-gradient(145deg, #b6a4e8, var(--science-dim));}
  .cell.room-dairy{background:linear-gradient(145deg, #e8d9a0, #b39b54);}
  .cell.room-vault{background:linear-gradient(145deg, #fff0c2, #c9a23a);}
  .cell.room-queen{
    background:radial-gradient(circle at 35% 30%, #fff3cf, var(--gold) 70%);
    color:#3a2a08;
    box-shadow:0 0 0 2px var(--gold), 0 0 14px 2px rgba(217,179,91,.5);
  }
  .cell .badge{
    position:absolute;
    bottom:-6px; right:-4px;
    background:var(--soil-void);
    border:1px solid var(--hairline);
    border-radius:6px;
    font-size:0.55rem;
    padding:1px 3px;
    font-family:'Space Mono',monospace;
    color:var(--cream-dim);
  }
  .cell .occ-badge{
    position:absolute;
    top:-6px; left:-4px;
    background:var(--soil-void);
    border:1px solid var(--gold);
    border-radius:6px;
    font-size:0.55rem;
    padding:1px 3px;
    font-family:'Space Mono',monospace;
    color:var(--gold);
  }
  .conn{
    border-radius:5px;
  }
  .conn.h{background:transparent;}
  .conn.v{background:transparent;}
  .conn.active{
    background:linear-gradient(var(--tunnel-lit), var(--tunnel));
    box-shadow: inset 0 0 3px rgba(0,0,0,.4);
  }

  .ant-dot{
    position:absolute;
    width:7px; height:7px;
    border-radius:50%;
    background:#1c1108;
    box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 0 3px rgba(0,0,0,.5);
    pointer-events:none;
    z-index:5;
    transition: left 1.1s cubic-bezier(.4,0,.2,1), top 1.1s cubic-bezier(.4,0,.2,1), opacity .3s;
  }
  .ant-dot.leaf::after{content:'';position:absolute; top:-3px; left:1px; width:4px; height:4px; background:var(--leaf); border-radius:1px; transform:rotate(20deg);}
  .ant-dot.fungus::after{content:'';position:absolute; top:-3px; left:1px; width:4px; height:4px; background:var(--fungus); border-radius:50%;}
  .ant-dot.water::after{content:'';position:absolute; top:-3px; left:1px; width:4px; height:4px; background:var(--water); border-radius:50%;}

  /* ---------- tech tree ---------- */
  .tech-branch{margin-bottom:16px;}
  .tech-branch-title{
    font-size:0.78rem; text-transform:uppercase; letter-spacing:.06em;
    color:var(--cream-faint); margin-bottom:8px; display:flex; align-items:center; gap:6px;
  }
  .tech-card{
    display:flex; align-items:flex-start; gap:10px;
    background:var(--soil-panel-2);
    border:1px solid var(--hairline);
    border-radius:8px;
    padding:10px;
    margin-bottom:8px;
  }
  .tech-card.done{border-color:var(--leaf-dim); background:#283a1c;}
  .tech-card.locked{opacity:0.5;}
  .tech-card .ic{font-size:1.3rem;}
  .tech-card .meta{flex:1;}
  .tech-card .name{font-weight:600; font-size:0.85rem;}
  .tech-card .desc{font-size:0.74rem; color:var(--cream-dim); margin-top:2px;}
  .tech-card .cost{font-size:0.7rem; font-family:'Space Mono',monospace; color:var(--science); margin-top:4px;}
  .tech-card button{
    background:var(--science-dim); border:1px solid var(--science);
    color:var(--cream); border-radius:6px; padding:6px 10px; font-size:0.72rem;
    cursor:pointer; flex-shrink:0; align-self:center;
  }
  .tech-card button:hover{background:var(--science);}
  .tech-card button:disabled{opacity:0.4; cursor:not-allowed;}
  .tech-card .done-tag{color:var(--leaf); font-size:0.72rem; align-self:center; flex-shrink:0;}

  /* ---------- encyclopedia ---------- */
  .lex-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:8px;}
  .lex-card{
    background:var(--soil-panel-2); border:1px solid var(--hairline); border-radius:8px;
    padding:10px; cursor:pointer; transition:border-color .15s;
  }
  .lex-card:hover{border-color:var(--gold-dim);}
  .lex-card.locked{opacity:0.35; cursor:default;}
  .lex-card .ic{font-size:1.6rem;}
  .lex-card .name{font-weight:600; font-size:0.8rem; margin-top:4px;}
  .lex-card .tag{font-size:0.65rem; color:var(--cream-faint);}
  .lex-detail{
    background:var(--soil-panel-2); border:1px solid var(--hairline-lit); border-radius:8px;
    padding:14px; margin-top:12px; font-size:0.82rem; line-height:1.6; color:var(--cream-dim);
  }
  .lex-detail h3{color:var(--cream); font-size:1rem; margin:0 0 8px;}
  .lex-detail .fact{margin-bottom:8px; padding-left:14px; border-left:2px solid var(--gold-dim);}

  /* ---------- achievements ---------- */
  .ach-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:10px;}
  .ach-card{
    display:flex; gap:10px; align-items:flex-start;
    background:var(--soil-panel-2); border:1px solid var(--hairline); border-radius:8px; padding:10px;
  }
  .ach-card.unlocked{border-color:var(--gold-dim); background:#3a2c14;}
  .ach-card .ic{font-size:1.5rem; opacity:0.5;}
  .ach-card.unlocked .ic{opacity:1;}
  .ach-card .name{font-weight:600; font-size:0.82rem;}
  .ach-card .desc{font-size:0.72rem; color:var(--cream-dim); margin-top:2px;}

  /* ---------- stat tab ---------- */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:10px; margin-bottom:14px;}
  .stat-box{background:var(--soil-panel-2); border:1px solid var(--hairline); border-radius:8px; padding:12px;}
  .stat-box .big{font-family:'Space Mono',monospace; font-size:1.4rem; color:var(--gold);}
  .stat-box .lbl{font-size:0.7rem; color:var(--cream-faint); text-transform:uppercase; letter-spacing:.05em; margin-top:2px;}

  /* ---------- log ---------- */
  .log-panel{
    margin-top:16px;
  }
  .log-list{
    list-style:none;
    margin:0; padding:0;
    max-height:170px;
    overflow-y:auto;
    font-size:0.8rem;
    display:flex;
    flex-direction:column-reverse;
    gap:5px;
  }
  .log-list li{
    color:var(--cream-dim);
    border-left:2px solid var(--hairline);
    padding-left:8px;
  }
  .log-list li.raid-fail{color:var(--alert); border-left-color:var(--alert);}
  .log-list li.raid-win{color:var(--leaf); border-left-color:var(--leaf);}
  .log-list li.fresh{color:var(--cream);}
  .log-list li.tech{color:var(--science); border-left-color:var(--science);}
  .log-list li.season{color:var(--fungus); border-left-color:var(--fungus);}
  .log-list li.ach{color:var(--gold); border-left-color:var(--gold);}
  .log-time{font-family:'Space Mono',monospace; font-size:0.68rem; color:var(--cream-dim); margin-right:6px;}

  footer.appfoot{
    margin-top:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:0.72rem;
    color:var(--cream-dim);
    flex-wrap:wrap;
    gap:8px;
  }
  .foot-actions{display:flex; gap:8px;}
  .reset-btn, .speed-btn{
    background:transparent;
    border:1px solid var(--hairline);
    color:var(--cream-dim);
    border-radius:6px;
    padding:5px 10px;
    font-size:0.72rem;
    cursor:pointer;
  }
  .reset-btn:hover{border-color:var(--alert); color:var(--alert);}
  .speed-btn.active{border-color:var(--gold); color:var(--gold);}
  .speed-btn:hover{border-color:var(--gold-dim);}

  .toast{
    position:fixed;
    bottom:20px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--soil-panel);
    border:1px solid var(--gold);
    color:var(--cream);
    padding:10px 18px;
    border-radius:8px;
    font-size:0.85rem;
    opacity:0;
    transition:opacity .3s, transform .3s;
    pointer-events:none;
    z-index:50;
    max-width:90vw;
    text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- modal (species select / intro) ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(8,5,2,0.78);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
  }
  .modal-box{

function speciesModalHtml(){
  const cards = Object.values(SPECIES).map(sp => `
    <div class="species-card" data-species="${sp.key}" tabindex="0" role="button">
      <div class="sp-head">
        <span class="sp-ic">${sp.icon}</span>
        <div>
          <div class="sp-name">${sp.name}</div>
          <div class="sp-latin">${sp.latin}</div>
        </div>
      </div>
      <div class="sp-desc">${sp.desc}</div>
      ${sp.traits.map(t => `<div class="sp-trait ${t.good?'':'con'}">${t.good?'✓':'△'} ${t.text}</div>`).join('')}
    </div>
  `).join('');
  return `
  <div class="modal-overlay" id="speciesModal">
    <div class="modal-box">
      <h2>🐜 Wähle deine Art</h2>
      <div class="modal-sub">Jede Ameisenart hat reale biologische Eigenheiten, die dein Spiel beeinflussen. Die Wahl ist endgültig für diese Kolonie.</div>
      <div class="species-grid">${cards}</div>
    </div>
  </div>`;
}

      <h2>${title}</h2>
      <div class="info-modal-body">${bodyHtml}</div>
      <button class="modal-close-btn" id="infoModalCloseBtn">Verstanden</button>
    </div>
  </div>`;
}
(function(){
  "use strict";

  /* ===================== CONFIG ===================== */
  const GR = 5, GC = 6;                 // logical room grid per depth level
  const QUEEN_R = 2, QUEEN_C = 2;
  const CELL = 54, CONN = 16;
  const DEPTHS = [
    {key:'d0', name:'Oberboden', icon:'🌱', unlockCost:0},
    {key:'d1', name:'Mittelschicht', icon:'🪵', unlockCost:60},
    {key:'d2', name:'Tiefenkammern', icon:'💎', unlockCost:160},
  ];

  const RATES = {
    leafPerForage: 0.9,
    fungusLeafCost: 1.4,
    fungusPerFungusRoom: 0.7,
    nurseryFungusPerAnt: 9,
    nurseryProgressPerSec: 0.16,
    soldierDefense: 4,
    baseDefense: 2,
    barracksCapacity: 3,
    digBaseCost: 8,
    digCostStep: 4,
    storageBase: 80,
    storagePerRoom: 60,
    sciencePerLabRoom: 0.22,
    waterPerRoom: 0.5,
    waterUpkeepPerAnt: 0.015,
    compostBonus: 0.3,
    dairyHoneyPerRoom: 0.6,
  };

  const SAVE_KEY = 'myrmex_save_v2';

  /* ===================== STATE ===================== */
  let cells = {};         // depthKey -> array of GR*GC logical cells {dug, room, builtAt}
  let resources = {leaves:35, fungus:6, water:0, honey:0, science:0, prestige:0};
  let ants = 4;
  let antsCap = 6;
  let casteCounts = {forager:0, gardener:0, nurse:0, soldier:0, scholar:0};
  let nurseryProgress = 0;
  let mode = null;         // null | 'dig' | room key
  let activeDepth = 'd0';
  let unlockedDepths = ['d0'];
  let ageSec = 0;
  let nextRaidIn = randRange(40,65);
  let raidWarningGiven = false;
  let logEntries = [];
  let speciesKey = null;
  let activeTab = 'build';
  let speedMult = 1;
  let seasonIdx = 0;        // index into SEASONS
  let seasonElapsed = 0;
  let seasonDuration = 90;  // seconds per season at 1x speed
  let seasonsSeenSet = [];
  let techDone = {};        // key -> true
  let unlockedRooms = {};   // key -> true (rooms without requiresTech always true)
  let achievementsUnlocked = {};
  let lexUnlocked = {};
  let builtRoomTypesEver = {};
  let lifetimeStats = {leavesTotal:0, dugTotal:0, roomsTotal:0, raidsWon:0, raidsLost:0};
  let pendingLexDetail = null;

  function randRange(a,b){return Math.floor(a + Math.random()*(b-a));}

  function speciesMods(){
    if(!speciesKey || !SPECIES[speciesKey]) return {};
    return SPECIES[speciesKey].mods || {};
  }

  /* ===================== INIT ===================== */
  function freshState(keepSpecies){
    cells = {};
    DEPTHS.forEach(d=>{
      const arr = [];
      for(let r=0;r<GR;r++){
        for(let c=0;c<GC;c++){
          arr.push({r,c, dug:false, room:null});
        }
      }
      cells[d.key] = arr;
    });
    cellAt('d0', QUEEN_R,QUEEN_C).dug = true;
    cellAt('d0', QUEEN_R,QUEEN_C).room = 'queen';
    resources = {leaves:35, fungus:6, water:0, honey:0, science:0, prestige:0};
    ants = 4; antsCap = 6; nurseryProgress = 0;
    casteCounts = {forager:0, gardener:0, nurse:0, soldier:0, scholar:0};
    ageSec = 0; nextRaidIn = randRange(40,65); raidWarningGiven = false;
    logEntries = [];
    activeDepth = 'd0';
    unlockedDepths = ['d0'];
    activeTab = 'build';
    speedMult = 1;
    seasonIdx = 0; seasonElapsed = 0; seasonsSeenSet = [SEASONS[0]];
    techDone = {};
    unlockedRooms = {};
    achievementsUnlocked = {};
    lexUnlocked = {};
    builtRoomTypesEver = {};
    lifetimeStats = {leavesTotal:0, dugTotal:0, roomsTotal:0, raidsWon:0, raidsLost:0};
    if(!keepSpecies) speciesKey = null;
    addLog('Die Königin hat ihre erste Kammer gegraben. Die Kolonie beginnt.', 'fresh');
    checkLexUnlocks();
  }

  function cellAt(depth, r,c){ return cells[depth][r*GC+c]; }
  function idx(r,c){ return r*GC+c; }
  function inBounds(r,c){ return r>=0 && r<GR && c>=0 && c<GC; }

  function neighbors(r,c){
    return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc])=>inBounds(nr,nc));
  }

  function isDiggable(depth, r,c){
    const cell = cellAt(depth, r,c);
    if(cell.dug) return false;
    // depth 0 needs adjacency; deeper levels need adjacency too, but the very first cell
    // of an unlocked deeper level starts pre-dug to act as the entrance shaft.
    return neighbors(r,c).some(([nr,nc])=>cellAt(depth, nr,nc).dug);
  }

  function digCost(depth){
    const dugCount = cells[depth].filter(c=>c.dug).length;
    const mods = speciesMods();
    const base = RATES.digBaseCost + dugCount * RATES.digCostStep;
    return Math.round(base * (mods.digCostMult || 1));
  }

  function isRoomUnlocked(key){
    const def = ROOM_TYPES[key];
    if(!def) return false;
    if(def.speciesOnly && def.speciesOnly !== speciesKey) return false;
    if(!def.requiresTech) return true;
    return !!techDone[def.requiresTech];
  }

  function storageCap(){
    const storageRooms = allCellsFlat().filter(c=>c.room==='storage').length;
    return RATES.storageBase + storageRooms * RATES.storagePerRoom;
  }

  function allCellsFlat(){
    let out = [];
    DEPTHS.forEach(d=> out = out.concat(cells[d.key]));
    return out;
  }

  function roomsOfType(type){
    return allCellsFlat().filter(c=>c.room===type);
  }

  /* ===================== ECONOMY TICK ===================== */
  const state = {lastSoldiers:0, lastWorkersNeeded:0, lastEfficiency:1, lastScienceRate:0};

  function currentSeasonInfo(){ return SEASON_INFO[SEASONS[seasonIdx]]; }

  function advanceSeasonIfNeeded(){
    seasonElapsed++;
    if(seasonElapsed >= seasonDuration){
      seasonElapsed = 0;
      const prevWinter = SEASONS[seasonIdx]==='winter';
      seasonIdx = (seasonIdx+1) % SEASONS.length;
      const name = SEASON_INFO[SEASONS[seasonIdx]].name;
      addLog(`Die Jahreszeit wechselt zu ${name}.`, 'season');
      if(!seasonsSeenSet.includes(SEASONS[seasonIdx])) seasonsSeenSet.push(SEASONS[seasonIdx]);
      if(prevWinter){
        unlockAchievement('survivedWinter');
        flashToast('❄️ Ihr habt den Winter überlebt!');
      }
      if(seasonsSeenSet.length>=4) unlockAchievement('oldColony');
      checkLexUnlocks();
    }
  }

  function techEffectValue(key, fallback){
    let v = fallback;
    Object.values(TECHS).forEach(t=>{
      if(techDone[t.key] && t.effect && t.effect[key]!==undefined){
        if(typeof t.effect[key] === 'number'){
          v = (v===undefined?1:v) * t.effect[key];
        }
      }
    });
    return v;
  }

  function tick(){
    ageSec += speedMult;
    for(let s=0;s<speedMult;s++) advanceSeasonIfNeeded();

    const mods = speciesMods();
    const season = currentSeasonInfo();

    const forageRooms = roomsOfType('forage');
    const fungusRooms  = roomsOfType('fungus');
    const nurseryRooms = roomsOfType('nursery');
    const barracksRooms= roomsOfType('barracks');
    const waterRooms = roomsOfType('water');
    const compostRooms = roomsOfType('compost');
    const labRooms = roomsOfType('lab');
    const dairyRooms = roomsOfType('dairy');
    const vaultRooms = roomsOfType('vault');

    const workersNeeded = forageRooms.length + fungusRooms.length + nurseryRooms.length +
      barracksRooms.length + waterRooms.length + compostRooms.length + labRooms.length + dairyRooms.length;
    const efficiency = workersNeeded>0 ? Math.min(1, ants/Math.max(1,workersNeeded)) : 1;

    const cap = storageCap();
    const forageMult = (mods.forageMult||1) * season.forageMult * techEffectValue('forageMult',1);
    const fungusMult = (mods.fungusMult||1) * season.fungusMult;
    const nurseryMult = (mods.nurseryMult||1) * season.nurseryMult * techEffectValue('nurseryProgressMult',1);

    for(let s=0;s<speedMult;s++){
      // foraging - gated by assigned caste, capped by rooms
      const activeForagers = Math.min(casteCounts.forager, forageRooms.length * 3);
      const forageWorkRatio = forageRooms.length>0 ? Math.min(1, activeForagers/forageRooms.length) : 0;
      if(forageRooms.length>0 && forageWorkRatio>0){
        const gain = forageRooms.length * RATES.leafPerForage * forageMult * forageWorkRatio;
        resources.leaves = Math.min(cap, resources.leaves + gain);
        lifetimeStats.leavesTotal += gain;
        if(Math.random() < 0.5*forageWorkRatio){
          const src = forageRooms[randRange(0,forageRooms.length)];
          spawnAntDot(src, queenCell(), 'leaf');
        }
      }

      // water gathering (forager caste shared with water rooms too, simplified: scales with forager presence)
      if(waterRooms.length>0 && casteCounts.forager>0){
        const ratio = Math.min(1, casteCounts.forager / Math.max(1, forageRooms.length+waterRooms.length));
        const gain = waterRooms.length * RATES.waterPerRoom * ratio;
        resources.water = Math.min(cap*0.5, resources.water + gain);
        if(Math.random()<0.25*ratio){
          const src = waterRooms[randRange(0,waterRooms.length)];
          spawnAntDot(src, queenCell(), 'water');
        }
      }
      // water upkeep in winter
      const waterUpkeep = ants * RATES.waterUpkeepPerAnt * (SEASONS[seasonIdx]==='winter'?2.2:1);
      resources.water = Math.max(0, resources.water - waterUpkeep);

      // dairy - honey production (lasius only, but room itself already gated)
      if(dairyRooms.length>0 && casteCounts.forager>0){
        resources.honey += dairyRooms.length * RATES.dairyHoneyPerRoom * 0.5;
      }

      // fungus conversion - gated by gardener caste
      const activeGardeners = Math.min(casteCounts.gardener, fungusRooms.length * 3);
      const gardenRatio = fungusRooms.length>0 ? Math.min(1, activeGardeners/fungusRooms.length) : 0;
      if(fungusRooms.length>0 && gardenRatio>0){
        const compostBonus = compostRooms.length>0 ? (1+RATES.compostBonus*Math.min(1,compostRooms.length/Math.max(1,fungusRooms.length))) : 1;
        const wanted = fungusRooms.length * RATES.fungusLeafCost * gardenRatio;
        const used = Math.min(wanted, resources.leaves);
        const ratio = wanted>0 ? used/wanted : 0;
        resources.leaves -= used;
        const gain = fungusRooms.length * RATES.fungusPerFungusRoom * fungusMult * gardenRatio * ratio * compostBonus;
        resources.fungus = Math.min(cap, resources.fungus + gain);
        if(Math.random() < 0.4*gardenRatio*ratio){
          const src = fungusRooms[randRange(0,fungusRooms.length)];
          spawnAntDot(src, queenCell(), 'fungus');
        }
      }

      // science from lab, gated by scholar caste
      if(labRooms.length>0){
        const scholarRatio = Math.min(1, casteCounts.scholar / Math.max(1,labRooms.length));
        const gain = labRooms.length * RATES.sciencePerLabRoom * scholarRatio;
        resources.science += gain;
        state.lastScienceRate = gain;
      } else {
        state.lastScienceRate = 0;
      }

      // nursery growth - gated by nurse caste
      antsCap = 6 + nurseryRooms.length * 4 + Math.round(4*(mods.nurseryMult>1?(mods.nurseryMult-1)*4:0));
      const nurseActive = nurseryRooms.length>0 && casteCounts.nurse>0;
      if(nurseActive && ants < antsCap && resources.water>=0){
        const nurseRatio = Math.min(1, casteCounts.nurse / Math.max(1,nurseryRooms.length));
        const winterPenalty = (SEASONS[seasonIdx]==='winter' && resources.water<2) ? 0.1 : 1;
        nurseryProgress += nurseryRooms.length * RATES.nurseryProgressPerSec * nurseryMult * nurseRatio * winterPenalty;
        if(nurseryProgress >= 1){
          const fungusMultTech = techEffectValue('nurseryFungusMult',1);
          const cost = RATES.nurseryFungusPerAnt * fungusMultTech;
          if(resources.fungus >= cost){
            resources.fungus -= cost;
            ants += 1;
            nurseryProgress -= 1;
            addLog('Eine neue Arbeiterin hat ihre Larvenkammer verlassen.', 'fresh');
            checkAchAntCount();
          } else {
            nurseryProgress = 0.99;
          }
        }
      }

      // raid countdown
      nextRaidIn--;
      const warnAt = techEffectValue('raidWarning',0) || 0;
      if(!raidWarningGiven && warnAt>0 && nextRaidIn<=warnAt && nextRaidIn>0){
        raidWarningGiven = true;
        flashToast('⚠️ Wachposten melden Bewegung in der Nähe...');
      }
      if(nextRaidIn <= 0){
        runRaid();
        nextRaidIn = randRange(50,85);
        raidWarningGiven = false;
      }

      resources.leaves = Math.max(0, Math.min(cap, resources.leaves));
      resources.fungus = Math.max(0, Math.min(cap, resources.fungus));
    }

    const idleAnts = Math.max(0, ants - (casteCounts.forager+casteCounts.gardener+casteCounts.nurse+casteCounts.soldier+casteCounts.scholar));
    const soldierCap = barracksRooms.length * RATES.barracksCapacity * (mods.barracksCapMult||1);
    const soldiers = Math.min(casteCounts.soldier, soldierCap);

    state.lastSoldiers = Math.round(soldiers);
    state.lastWorkersNeeded = workersNeeded;
    state.lastEfficiency = efficiency;

    checkAchievementsPassive();
    renderAll();
    save();
  }

  function queenCell(){ return cellAt('d0', QUEEN_R, QUEEN_C); }

  function runRaid(){
    const minutes = ageSec/60;
    const threatKeys = Object.keys(THREATS);
    const threat = THREATS[threatKeys[randRange(0,threatKeys.length)]];
    const season = currentSeasonInfo();
    const mods = speciesMods();

    const raidStrength = (6 + minutes*1.6 + Math.random()*4) * threat.strengthMult * season.raidMult;
    const baseDefBonus = techEffectValue('baseDefenseBonus',0) || 0;
    const soldierDefMult = (mods.defenseMult||1) * techEffectValue('soldierDefenseMult',1);
    const defense = RATES.baseDefense + baseDefBonus + state.lastSoldiers*RATES.soldierDefense*soldierDefMult;

    if(defense >= raidStrength){
      const bonus = Math.round(4 + Math.random()*6);
      resources.leaves = Math.min(storageCap(), resources.leaves + bonus);
      lifetimeStats.raidsWon++;
      addLog(`${threat.icon} ${threat.name} griff an — eure ${Math.round(state.lastSoldiers)} Soldatinnen haben ihn vertrieben. +${bonus} Blätter erbeutet.`, 'raid-win');
      flashToast(`Überfall abgewehrt! 🛡 (${threat.name})`);
      unlockAchievement('survivedRaid');
    } else {
      const compostRooms = roomsOfType('compost');
      const lossMult = compostRooms.length>0 ? 0.3 * 0.75 : 0.3;
      const lossLeaves = Math.round(resources.leaves*lossMult);
      const lossFungus = Math.round(resources.fungus*lossMult);
      resources.leaves -= lossLeaves;
      resources.fungus -= lossFungus;
      let antLoss = 0;
      if(state.lastSoldiers===0 && raidStrength > defense+5 && ants>2){
        antLoss = 1; ants -= 1;
      }
      lifetimeStats.raidsLost++;
      addLog(`${threat.icon} ${threat.name} hat die Kolonie überrannt! Verloren: ${lossLeaves} Blätter, ${lossFungus} Pilzfutter${antLoss?', 1 Ameise':''}.`, 'raid-fail');
      flashToast(`Überfall! ${threat.name} hat geplündert.`);
    }
    pendingLexDetail = threat.key; // could surface threat fact somewhere later
  }

  /* ===================== ANT DOT ANIMATION ===================== */
  function trackPos(n){
    let pos = 0;
    for(let i=0;i<n;i++){
      pos += (i%2===0) ? CELL : CONN;
    }
    return pos;
  }
  function cellCenterPx(cell){
    const colUnit = cell.c*2;
    const rowUnit = cell.r*2;
    const x = trackPos(colUnit) + CELL/2;
    const y = trackPos(rowUnit) + CELL/2;
    return {x,y};
  }

  function spawnAntDot(fromCell, toCell, kind){
    const grid = document.getElementById('grid');
    if(!grid) return;
    const from = cellCenterPx(fromCell);
    const to = cellCenterPx(toCell);
    const dot = document.createElement('div');
    dot.className = 'ant-dot ' + kind;
    dot.style.left = (from.x-3.5)+'px';
    dot.style.top = (from.y-3.5)+'px';
    grid.appendChild(dot);
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        dot.style.left = (to.x-3.5)+'px';
        dot.style.top = (to.y-3.5)+'px';
      });
    });
    setTimeout(()=>{
      dot.style.opacity = '0';
      setTimeout(()=>dot.remove(), 350);
    }, 1150);
  }

  /* ===================== TECH TREE LOGIC ===================== */
  function canResearch(key){
    const t = TECHS[key];
    if(!t) return false;
    if(techDone[key]) return false;
    if(resources.science < t.cost) return false;
    return t.requires.every(r=>techDone[r]);
  }

  function researchTech(key){
    const t = TECHS[key];
    if(!canResearch(key)) return;
    resources.science -= t.cost;
    techDone[key] = true;
    if(t.effect && t.effect.unlockRoom) unlockedRooms[t.effect.unlockRoom] = true;
    addLog(`Neue Technologie erforscht: ${t.name}.`, 'tech');
    flashToast(`🔬 Erforscht: ${t.name}`);
    if(Object.keys(techDone).length===1) unlockAchievement('firstTech');
    if(Object.keys(techDone).length===Object.keys(TECHS).length) unlockAchievement('allTechs');
    checkLexUnlocks();
    renderAll(); save();
  }

  /* ===================== ACHIEVEMENTS ===================== */
  function unlockAchievement(key){
    if(achievementsUnlocked[key]) return;
    achievementsUnlocked[key] = true;
    const a = ACHIEVEMENTS[key];
    if(a){
      addLog(`🏆 Erfolg freigeschaltet: ${a.name}`, 'ach');
      flashToast(`🏆 ${a.name}`);
    }
  }
  function checkAchAntCount(){
    if(ants>=10) unlockAchievement('tenAnts');
    if(ants>=50) unlockAchievement('fiftyAnts');
  }
  function checkAchievementsPassive(){
    checkAchAntCount();
    if(resources.leaves>=100) unlockAchievement('hundredLeaves');
    if(lifetimeStats.dugTotal>=20) unlockAchievement('deepDigger');
    const allTypes = Object.keys(ROOM_TYPES).filter(k=>isRoomUnlocked(k));
    if(allTypes.length>0 && allTypes.every(t=>builtRoomTypesEver[t])) unlockAchievement('allRoomTypes');
  }

  /* ===================== LEXICON UNLOCKS ===================== */
  function checkLexUnlocks(){
    Object.values(LEXICON).forEach(entry=>{
      if(lexUnlocked[entry.key]) return;
      if(entry.unlockedFromStart){ lexUnlocked[entry.key] = true; return; }
      const cond = entry.unlockAt;
      if(!cond) return;
      let ok = true;
      if(cond.ants && ants < cond.ants) ok = false;
      if(cond.rooms && !cond.rooms.every(r=>builtRoomTypesEver[r])) ok = false;
      if(cond.seasonsSeen && seasonsSeenSet.length < cond.seasonsSeen) ok = false;
      if(ok) lexUnlocked[entry.key] = true;
    });
  }

  /* ===================== GRID DOM ===================== */
  function buildGridDom(){
    const grid = document.getElementById('grid');
    if(!grid) return;
    grid.innerHTML = '';
    const dispCols = GC*2-1, dispRows = GR*2-1;
    const colTemplate = [];
    for(let i=0;i<dispCols;i++) colTemplate.push(i%2===0? CELL+'px' : CONN+'px');
    const rowTemplate = [];
    for(let i=0;i<dispRows;i++) rowTemplate.push(i%2===0? CELL+'px' : CONN+'px');
    grid.style.gridTemplateColumns = colTemplate.join(' ');
    grid.style.gridTemplateRows = rowTemplate.join(' ');

    for(let r=0;r<GR;r++){
      for(let c=0;c<GC;c++){
        const el = document.createElement('div');
        el.dataset.r=r; el.dataset.c=c;
        el.style.gridColumn = String(c*2+1);
        el.style.gridRow = String(r*2+1);
        el.addEventListener('click', ()=>onCellClick(r,c));
        el.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' ') onCellClick(r,c); });
        el.tabIndex = 0;
        grid.appendChild(el);
      }
    }
    for(let r=0;r<GR;r++){
      for(let c=0;c<GC-1;c++){
        const el = document.createElement('div');
        el.className='conn h';
        el.dataset.type='h'; el.dataset.r=r; el.dataset.c=c;
        el.style.gridColumn = String(c*2+2);
        el.style.gridRow = String(r*2+1);
        grid.appendChild(el);
      }
    }
    for(let r=0;r<GR-1;r++){
      for(let c=0;c<GC;c++){
        const el = document.createElement('div');
        el.className='conn v';
        el.dataset.type='v'; el.dataset.r=r; el.dataset.c=c;
        el.style.gridColumn = String(c*2+1);
        el.style.gridRow = String(r*2+2);
        grid.appendChild(el);
      }
    }
    renderCells();
  }

  function renderDepthTabs(){
    const wrap = document.getElementById('depthTabs');
    if(!wrap) return;
    wrap.innerHTML = DEPTHS.map(d=>{
      const unlocked = unlockedDepths.includes(d.key);
      const active = d.key===activeDepth;
      const canUnlock = !unlocked && resources.leaves>=d.unlockCost;
      return `<button class="depth-tab ${active?'active':''} ${unlocked?'':'locked'}" data-depth="${d.key}" ${unlocked?'':'data-locked="1"'}>
        <span>${d.icon}</span><span>${d.name}</span>
        ${unlocked?'' : `<span class="lock-tag">🔒 ${d.unlockCost} 🍃</span>`}
      </button>`;
    }).join('');
    wrap.querySelectorAll('.depth-tab').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const dk = btn.dataset.depth;
        if(btn.dataset.locked){
          const d = DEPTHS.find(x=>x.key===dk);
          if(resources.leaves >= d.unlockCost){
            resources.leaves -= d.unlockCost;
            unlockedDepths.push(dk);
            // pre-dig the entrance cell at top-left-ish so it's reachable
            const entrance = cellAt(dk, 0, 0);
            entrance.dug = true;
            addLog(`Neue Ebene erschlossen: ${d.name}.`, 'fresh');
            flashToast(`⛏ Ebene freigeschaltet: ${d.name}`);
            activeDepth = dk;
            buildGridDom();
            renderAll(); save();
          } else {
            flashToast('Nicht genug Blätter, um diese Ebene zu erschließen.');
          }
        } else {
          activeDepth = dk;
          buildGridDom();
          renderAll();
        }
      });
    });
  }

  function renderCells(){
    const grid = document.getElementById('grid');
    if(!grid) return;
    grid.querySelectorAll('[data-r][data-c]:not([data-type])').forEach(el=>{
      const r = +el.dataset.r, c = +el.dataset.c;
      const cell = cellAt(activeDepth, r,c);
      el.className = 'cell';
      el.innerHTML = '';
      if(!cell.dug){
        el.classList.add('undug');
        if(isDiggable(activeDepth, r,c) && mode==='dig') el.classList.add('diggable');
      } else if(cell.room){
        const def = ROOM_TYPES[cell.room] || (cell.room==='queen'? {icon:'👑',cls:'room-queen'} : null);
        el.classList.add('dug');
        if(def){ el.classList.add(def.cls); el.innerHTML = `<span>${def.icon}</span>`; }
        if(cell.room==='nursery'){
          const pct = Math.min(99, Math.round(nurseryProgress*100));
          el.innerHTML += `<span class="badge">${pct}%</span>`;
        }
        if(cell.room && cell.room!=='queen' && CASTES[ROOM_TYPES[cell.room].caste]){
          // no per-room occupancy tracked individually (caste pool is global) - skip badge
        }
      } else {
        el.classList.add('dug','empty');
        if(mode && ROOM_TYPES[mode]) el.classList.add('buildable');
        el.innerHTML = '<span style="opacity:.35;font-size:1.1rem;">·</span>';
      }
    });
    grid.querySelectorAll('.conn').forEach(el=>{
      const r = +el.dataset.r, c = +el.dataset.c;
      let active;
      if(el.dataset.type==='h') active = cellAt(activeDepth, r,c).dug && cellAt(activeDepth, r,c+1).dug;
      else active = cellAt(activeDepth, r,c).dug && cellAt(activeDepth, r+1,c).dug;
      el.classList.toggle('active', active);
    });
  }

    const pill = document.getElementById('speciesPill');
    if(pill) pill.innerHTML = sp ? `<span class="sp-ic">${sp.icon}</span> ${sp.name}` : '';

    const hasVault = roomsOfType('vault').length>0;

    let chips = `
      <div class="res-chip ${resources.leaves>=cap?'cap':''}"><span class="ic">🍃</span><span class="val">${fmt(resources.leaves)}/${fmt(cap)}</span><span class="lbl">Blätter</span></div>
      <div class="res-chip ${resources.fungus>=cap?'cap':''}"><span class="ic">🍄</span><span class="val">${fmt(resources.fungus)}/${fmt(cap)}</span><span class="lbl">Pilzfutter</span></div>
      <div class="res-chip ${ants>=antsCap?'warn':''}"><span class="ic">🐜</span><span class="val">${ants}/${antsCap}</span><span class="lbl">Ameisen</span></div>

      chips += `<div class="res-chip ${resources.water<2 && SEASONS[seasonIdx]==='winter' ?'warn':''}"><span class="ic">💧</span><span class="val">${fmt(resources.water)}</span><span class="lbl">Wasser</span></div>`;
    }
    if(hasHoney){
      chips += `<div class="res-chip"><span class="ic">🍯</span><span class="val">${fmt(resources.honey)}</span><span class="lbl">Honigtau</span></div>`;
    }
    if(hasScience){
      chips += `<div class="res-chip"><span class="ic">🔬</span><span class="val">${fmt(resources.science)}</span><span class="lbl">Wissenschaft</span></div>`;

  /* ===================== BUILD PALETTE ===================== */
  function renderPalette(){
    const wrap = document.getElementById('buildPalette');
    if(!wrap) return;
    wrap.innerHTML = '';
    const badge = document.getElementById('roomCountBadge');
    const totalBuilt = allCellsFlat().filter(c=>c.room && c.room!=='queen').length;
    if(badge) badge.textContent = totalBuilt + ' gebaut';

    Object.values(ROOM_TYPES).forEach(def=>{
      const unlocked = isRoomUnlocked(def.key);
      const affordable = unlocked && canAfford(def.cost);
      const btn = document.createElement('button');
      btn.className = 'build-btn' + (mode===def.key?' selected':'') + (!affordable?' disabled':'') + (!unlocked?' locked':'');
      const lockTag = !unlocked ? `<span class="lock-tag">🔒 ${def.requiresTech ? 'Tech: '+(TECHS[def.requiresTech]?TECHS[def.requiresTech].name:'?') : (def.speciesOnly ? SPECIES[def.speciesOnly].name : '')}</span>` : '';
      btn.innerHTML = `
        <span class="ic">${def.icon}</span>
        <span class="meta">
          <div class="name">${def.name} ${lockTag}</div>
          <div class="desc">${def.desc}</div>
          <div class="cost">${costString(def.cost)}</div>
        </span>`;
      btn.addEventListener('click', ()=>{
        if(!unlocked){ flashToast('Diese Kammer ist noch nicht freigeschaltet.'); return; }

  function costString(cost){
    const map = {leaves:'Blätter', fungus:'Pilzfutter', water:'Wasser'};
    return Object.entries(cost).map(([k,v])=> `${v} ${map[k]||k}`).join(' · ');
  }
  function canAfford(cost){
    return Object.entries(cost).every(([k,v])=> (resources[k]||0) >= v);
  }

  /* ===================== CASTE ASSIGNMENT ===================== */
  function totalAssigned(){
    return casteCounts.forager+casteCounts.gardener+casteCounts.nurse+casteCounts.soldier+casteCounts.scholar;
  }

  function renderCasteAssign(){
    const wrap = document.getElementById('casteAssign');
    if(!wrap) return;
    const free = ants - totalAssigned();
    const badge = document.getElementById('casteAssignedBadge');
    if(badge) badge.textContent = `${totalAssigned()}/${ants}`;

    const rows = Object.values(CASTES).filter(c=>c.key!=='builder').map(c=>{
      const n = casteCounts[c.key]||0;
      const roomCount = roomCountForCaste(c.key);
      const cap = roomCapForCaste(c.key);
      return `
      <div class="caste-row">
        <span class="ic">${c.icon}</span>
        <span class="lbl">${c.name}<br><span style="color:var(--cream-faint); font-size:0.68rem;">${roomCount} Raum(e) · Kapazität ${cap}</span></span>
        <span class="ctrl">
          <button data-caste="${c.key}" data-dir="-1" ${n<=0?'disabled':''}>−</button>
          <span class="num">${n}</span>
          <button data-caste="${c.key}" data-dir="1" ${(free<=0 || n>=cap)?'disabled':''}>+</button>
        </span>
      </div>`;
    }).join('');

    wrap.innerHTML = rows + `
      <div class="caste-total-row ${free<0?'over':''}">
        <span>Freie Baumeisterinnen</span><span class="mono">${Math.max(0,free)}</span>
      </div>`;

    wrap.querySelectorAll('button[data-caste]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const c = btn.dataset.caste;
        const dir = +btn.dataset.dir;
        const free2 = ants - totalAssigned();
        const cap = roomCapForCaste(c);
        if(dir>0 && free2>0 && casteCounts[c]<cap) casteCounts[c]++;
        if(dir<0 && casteCounts[c]>0) casteCounts[c]--;
        renderAll(); save();
      });
    });
  }

  function roomCountForCaste(casteKey){
    const roomKey = Object.values(ROOM_TYPES).find(r=>r.caste===casteKey);
    if(!roomKey) return 0;
    // multiple room types can share a caste (forager used by forage+water+dairy)
    return Object.values(ROOM_TYPES).filter(r=>r.caste===casteKey).reduce((sum,r)=> sum + roomsOfType(r.key).length, 0);
  }
  function roomCapForCaste(casteKey){
    const count = roomCountForCaste(casteKey);
    if(casteKey==='soldier'){
      const mods = speciesMods();
      return Math.round(count * RATES.barracksCapacity * (mods.barracksCapMult||1));
    }
    return count * 3;
  }

  /* ===================== TECH TREE RENDER ===================== */
  function renderTechPanel(){
    const branches = {gather:'Sammeln & Vorrat', defense:'Verteidigung & Schutz', pop:'Bevölkerung & Wissen'};
    const branchIcons = {gather:'🍃', defense:'🛡', pop:'🥚'};
    let html = '';
    Object.entries(branches).forEach(([bk,label])=>{
      const techs = Object.values(TECHS).filter(t=>t.branch===bk);
      html += `<div class="tech-branch"><div class="tech-branch-title">${branchIcons[bk]} ${label}</div>`;
      techs.forEach(t=>{
        const done = !!techDone[t.key];
        const locked = !done && !t.requires.every(r=>techDone[r]);
        const afford = canResearch(t.key);
        html += `
        <div class="tech-card ${done?'done':''} ${locked?'locked':''}">
          <span class="ic">${t.icon}</span>
          <span class="meta">
            <div class="name">${t.name}</div>
            <div class="desc">${t.desc}</div>
            ${!done?`<div class="cost">${t.cost} 🔬 Wissenschaft${t.requires.length?' · benötigt: '+t.requires.map(r=>TECHS[r].name).join(', '):''}</div>`:''}
          </span>
          ${done? '<span class="done-tag">✓ erforscht</span>' : `<button data-tech="${t.key}" ${(!afford||locked)?'disabled':''}>Erforschen</button>`}
        </div>`;
      });
      html += `</div>`;
    });

    document.getElementById('techPanelWide').innerHTML = `<h2>🌿 Forschungsbaum</h2>${html}`;
    document.getElementById('techPanelWide').querySelectorAll('button[data-tech]').forEach(btn=>{
      btn.addEventListener('click', ()=> researchTech(btn.dataset.tech));
    });
  }

  function updateModeUi(){
    document.getElementById('digBtn').classList.toggle('selected', mode==='dig');
    document.getElementById('cancelBtn').style.display = mode ? 'block' : 'none';
    const info = document.getElementById('selectedInfo');
    if(mode==='dig'){
      info.textContent = `Klicke auf einen markierten Gang, um ihn für ${digCost(activeDepth)} Blätter zu graben.`;
    } else if(mode && ROOM_TYPES[mode]){
      info.textContent = `Klicke auf eine leere, gegrabene Kammer, um „${ROOM_TYPES[mode].name}" zu bauen.`;

  /* ===================== INTERACTION ===================== */
  function onCellClick(r,c){
    const cell = cellAt(activeDepth, r,c);
    if(mode==='dig'){
      if(!isDiggable(activeDepth, r,c)){ flashToast('Dieser Gang ist noch nicht erreichbar.'); return; }
      const cost = digCost(activeDepth);
      if(resources.leaves < cost){ flashToast('Nicht genug Blätter zum Graben.'); return; }
      resources.leaves -= cost;
      cell.dug = true;
      lifetimeStats.dugTotal++;
      addLog('Ein neuer Gang wurde in die Erde gegraben.', 'fresh');
      renderAll(); save();
      return;
    }
    if(mode && ROOM_TYPES[mode]){
      if(!isRoomUnlocked(mode)){ flashToast('Diese Kammer ist noch nicht freigeschaltet.'); return; }
      if(!cell.dug || cell.room){ flashToast('Hier kann nichts gebaut werden.'); return; }
      const def = ROOM_TYPES[mode];
      if(!canAfford(def.cost)){ flashToast('Nicht genug Ressourcen.'); return; }
      Object.entries(def.cost).forEach(([k,v])=> resources[k]-=v);
      cell.room = mode;
      lifetimeStats.roomsTotal++;
      builtRoomTypesEver[mode] = true;
      addLog(`${def.name} wurde gebaut.`, 'fresh');
      if(lifetimeStats.roomsTotal===1) unlockAchievement('firstRoom');
      if(mode==='vault') unlockAchievement('vaultBuilt');
      checkLexUnlocks();
      checkAchievementsPassive();
      renderAll(); save();
      return;
    }
    if(cell.room){
      const def = ROOM_TYPES[cell.room];
      if(def) flashToast(`${def.icon} ${def.name} — ${def.desc}`);
      else flashToast('👑 Die Königskammer — Herz der Kolonie.');
    }
  }

  /* ===================== VAULT PRESTIGE TICKING (separate light tick) ===================== */
  function vaultTick(){
    const vaultRooms = roomsOfType('vault');
    if(vaultRooms.length>0){
      resources.prestige += vaultRooms.length * 0.05 * speedMult;
    }
  }

  /* ===================== TABS ===================== */
  function setupTabs(){
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b===btn));
        document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active', p.dataset.tabpanel===activeTab));
        document.getElementById('techPanelWide').style.display = activeTab==='tech' ? 'block':'none';
        document.getElementById('lexPanelWide').style.display = activeTab==='lex' ? 'block':'none';
        document.getElementById('achPanelWide').style.display = activeTab==='ach' ? 'block':'none';
        renderAll();
      });
    });
  }

  function setupSpeedButtons(){
    [1,2,3].forEach(s=>{
      const btn = document.getElementById('speed'+s+'Btn');
      if(!btn) return;
      btn.addEventListener('click', ()=>{
        speedMult = s;
        document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active', +b.dataset.speed===s));
      });
    });
  }

  /* ===================== LOG / TOAST ===================== */
  function addLog(text, cls){
    const time = ageStr();
    logEntries.push({text,cls,time});
    if(logEntries.length>80) logEntries.shift();
    renderLog();
  }
  function renderLog(){
    const list = document.getElementById('logList');
    if(!list) return;
    list.innerHTML = logEntries.slice(-50).map(e=>
      `<li class="${e.cls||''}"><span class="log-time">${e.time}</span>${e.text}</li>`
    ).reverse().join('');
  }
  let toastTimer=null;
  function flashToast(msg){
    const t = document.getElementById('toast');
    if(!t) return;
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
  }

  /* ===================== SPECIES MODAL ===================== */
  function showSpeciesModal(){
    const app = document.getElementById('app');
    const wrap = document.createElement('div');
    wrap.innerHTML = speciesModalHtml();
    document.body.appendChild(wrap.firstElementChild);
    document.querySelectorAll('.species-card').forEach(card=>{
      const pick = ()=>{
        speciesKey = card.dataset.species;
        const modal = document.getElementById('speciesModal');
        if(modal) modal.remove();
        addLog(`Die Kolonie hat sich als ${SPECIES[speciesKey].name} (${SPECIES[speciesKey].latin}) etabliert.`, 'fresh');
        flashToast(`${SPECIES[speciesKey].icon} Art gewählt: ${SPECIES[speciesKey].name}`);
        save();
        renderAll();
      };
      card.addEventListener('click', pick);
      card.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' ') pick(); });
    });
  }

  /* ===================== INFO MODAL (room-build first-time tooltip helper) ===================== */
  function showInfoModal(title, bodyHtml){
    const wrap = document.createElement('div');
    wrap.innerHTML = infoModalHtml(title, bodyHtml);
    document.body.appendChild(wrap.firstElementChild);
    document.getElementById('infoModalCloseBtn').addEventListener('click', ()=>{
      const modal = document.getElementById('infoModal');
      if(modal) modal.remove();
    });
  }

  /* ===================== SAVE / LOAD ===================== */
  function save(){
    try{
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        v:2, cells, resources, ants, antsCap, casteCounts, nurseryProgress,
        mode:null, activeDepth, unlockedDepths, ageSec, nextRaidIn, raidWarningGiven,
        logEntries, speciesKey, speedMult, seasonIdx, seasonElapsed, seasonsSeenSet,
        techDone, unlockedRooms, achievementsUnlocked, lexUnlocked, builtRoomTypesEver, lifetimeStats
      }));
    }catch(e){ /* storage unavailable, ignore */ }
  }
  function load(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw) return false;
      const data = JSON.parse(raw);
      if(data.v!==2) return false; // old/incompatible save -> fresh start
      cells = data.cells; resources = data.resources; ants = data.ants;
      antsCap = data.antsCap; casteCounts = data.casteCounts || {forager:0,gardener:0,nurse:0,soldier:0,scholar:0};
      nurseryProgress = data.nurseryProgress;
      activeDepth = data.activeDepth || 'd0';
      unlockedDepths = data.unlockedDepths || ['d0'];
      ageSec = data.ageSec; nextRaidIn = data.nextRaidIn;
      raidWarningGiven = data.raidWarningGiven || false;
      logEntries = data.logEntries || [];
      speciesKey = data.speciesKey || null;
      speedMult = data.speedMult || 1;
      seasonIdx = data.seasonIdx || 0;
      seasonElapsed = data.seasonElapsed || 0;
      seasonsSeenSet = data.seasonsSeenSet || [SEASONS[0]];
      techDone = data.techDone || {};
      unlockedRooms = data.unlockedRooms || {};
      achievementsUnlocked = data.achievementsUnlocked || {};
      lexUnlocked = data.lexUnlocked || {};
      builtRoomTypesEver = data.builtRoomTypesEver || {};
      lifetimeStats = data.lifetimeStats || {leavesTotal:0,dugTotal:0,roomsTotal:0,raidsWon:0,raidsLost:0};
      return true;
    }catch(e){ return false; }
  }

  /* ===================== BOOT ===================== */
  function boot(){
    const app = document.getElementById('app');
    app.innerHTML = appShellHtml();

    const hadSave = load();
    if(!hadSave){ freshState(true); }
    checkLexUnlocks();

    buildGridDom();
    setupTabs();
    setupSpeedButtons();

    document.getElementById('digBtn').addEventListener('click', ()=>{
      mode = (mode==='dig') ? null : 'dig';
      updateModeUi();
    });
    document.getElementById('cancelBtn').addEventListener('click', ()=>{
      mode = null; updateModeUi();
    });
    document.getElementById('resetBtn').addEventListener('click', ()=>{
      if(confirm('Die gesamte Kolonie wirklich auflösen und neu beginnen?')){
        localStorage.removeItem(SAVE_KEY);
        speciesKey = null;
        freshState(false);
        buildGridDom();
        renderAll();
        renderLog();
        updateModeUi();
        if(!speciesKey) showSpeciesModal();
      }
    });
    document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active', +b.dataset.speed===speedMult));

    renderAll();
    renderLog();
    updateModeUi();

    if(!speciesKey){
      showSpeciesModal();
    }

    setInterval(()=>{ tick(); vaultTick(); }, 1000);
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }

})();

</script>
</body>
</html>
